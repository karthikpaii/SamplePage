<!DOCTYPE html>
<html>
<head>
<style>

.container{
  position: relative;
  width: 300px;
}

.container img{
  width: 100%;
  display: block;
}

.overlay{
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 100%;
  background: rgba(0,0,0,0.6);   /* semi-transparent dark background */
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: 0.5s;
  font-size: 20px;
}

.container:hover .overlay{
  opacity: 1;
}

</style>
</head>
<body>

<h2>Image Overlay Effect</h2>

<div class="container">
  <img src="https://picsum.photos/300/200" alt="image">
  <div class="overlay">Beautiful Image</div>
</div>

</body>
</html>
